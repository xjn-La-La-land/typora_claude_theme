name: Release Theme Package

on:
  push:
    tags:
      - "v*"
      - "Stable"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release title
        id: relname
        run: |
          if [ "${{ github.ref_name }}" = "Stable" ]; then
            latest_v=$(git describe --tags --abbrev=0 --exclude=Stable HEAD)
            echo "name=$latest_v" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build zip package
        run: zip -j Typora_Claude-Like_Theme.zip claude-like.css claude-like-grey.css claude-like-dark.css

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          allowUpdates: true
          artifacts: "claude-like.css,claude-like-grey.css,claude-like-dark.css,Typora_Claude-Like_Theme.zip"
          body: |
            Release for `${{ github.ref_name }}`.

            Included files:
            - `claude-like.css`
            - `claude-like-grey.css`
            - `claude-like-dark.css`
            - `Typora_Claude-Like_Theme.zip`
          generateReleaseNotes: true
          makeLatest: ${{ startsWith(github.ref_name, 'v') }}
          name: ${{ steps.relname.outputs.name }}
          prerelease: false
          tag: ${{ github.ref_name }}
