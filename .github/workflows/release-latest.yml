name: Release Theme Package

on:
  push:
    tags:
      - "v*"
      - "Stable"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release title
        id: relname
        run: |
          if [ "${{ github.ref_name }}" = "Stable" ]; then
            latest_v=$(git describe --tags --abbrev=0 --exclude=Stable HEAD)
            echo "name=$latest_v" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS + plugin
        run: npm run build

      - name: Build zip package
        run: zip -j Typora_Claude-Like_Theme.zip claude-like.css claude-like-grey.css claude-like-dark.css dist/claude-like-plugin.html

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          allowUpdates: true
          artifacts: "claude-like.css,claude-like-grey.css,claude-like-dark.css,dist/claude-like-plugin.html,Typora_Claude-Like_Theme.zip"
          body: |
            Release for `${{ github.ref_name }}`.

            Included files:
            - `claude-like.css` — light theme
            - `claude-like-grey.css` — Morandi grey-blue theme
            - `claude-like-dark.css` — dark theme
            - `claude-like-plugin.html` — HTML enhancement plugin; paste into Typora export setting (see README)
            - `Typora_Claude-Like_Theme.zip` — all of the above bundled
          generateReleaseNotes: true
          makeLatest: ${{ startsWith(github.ref_name, 'v') }}
          name: ${{ steps.relname.outputs.name }}
          prerelease: false
          tag: ${{ github.ref_name }}
